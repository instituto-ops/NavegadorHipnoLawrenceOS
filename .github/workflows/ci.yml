name: CI React/Vite

# 1. Gatilhos (Triggers)
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    # 2. Ambiente de Execução
    # Utilizamos ubuntu-latest por ser mais rápido e econômico para validações web.
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Checkout - Baixar o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # Passo 2: Setup - Configurar Node.js versão 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Passo 3: Cache - Implementar cache robusto para node_modules usando o cache nativo do setup-node
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      # Passo 4: Instalação - Instalação limpa e determinística das dependências
      - name: Install dependencies
        run: |
          cd apps/frontend
          npm ci

      # Passo 5: Linting - Executar validação de estilo e qualidade de código
      - name: Run Linting
        run: |
          cd apps/frontend
          npm run lint

      # Passo 6: Build - Executar o build do Vite, que também engloba a validação de tipagem (tsc -b)
      - name: Run Build
        run: |
          cd apps/frontend
          npm run build
