name: CI Auto-Fixer & Checks

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  auto-fixer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
          pip install mypy ruff

      - name: Install Node dependencies
        run: |
          cd apps/frontend
          npm ci

      - name: Run Ruff Auto-Fixer
        run: |
          ruff check --fix . || true
          ruff format . || true

      - name: Run Frontend Format and Lint Auto-Fixer
        run: |
          cd apps/frontend
          npm run format || true
          npx eslint --fix . || true

      - name: Commit Automated Fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style(auto-fix): apply automated format and lint fixes"
          commit_options: '--no-verify'
          branch: ${{ github.head_ref || github.ref_name }}

  backend-checks:
    needs: auto-fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt
          pip install mypy ruff
      - name: Run Mypy Type Checking
        run: |
          mypy apps/backend --ignore-missing-imports

  frontend-checks:
    needs: auto-fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd apps/frontend
          npm ci
      - name: Run TypeScript Compiler Check
        run: |
          cd apps/frontend
          npx tsc --noEmit
