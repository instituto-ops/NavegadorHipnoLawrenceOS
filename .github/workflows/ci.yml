name: CI React/Vite

# Gatilhos (Triggers)
on:
  push:
    # Executar em pushes para as branches main e develop
    branches:
      - main
      - develop
  pull_request:
    # Executar em pull requests destinados à branch main
    branches:
      - main

jobs:
  build-and-lint:
    # Ambiente de Execução: ubuntu-latest (mais rápido e econômico para validação web)
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Fazer o checkout (baixar) do código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Configurar o Node.js versão 20
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Implementar cache robusto usando o cache nativo da action setup-node
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      # Passo 3: Instalação limpa das dependências usando npm ci
      - name: Instalar dependências
        working-directory: ./apps/frontend
        run: npm ci

      # Passo 4: Executar o linter para garantir a qualidade do código
      - name: Executar Lint
        working-directory: ./apps/frontend
        run: npm run lint

      # Passo 5: Executar o build para compilar a aplicação Vite e validar a tipagem TypeScript
      - name: Build da aplicação (Vite + TypeScript)
        working-directory: ./apps/frontend
        run: npm run build
