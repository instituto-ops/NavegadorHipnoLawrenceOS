name: React/Vite CI

# Gatilhos de execução do workflow
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-and-lint:
    # Ambiente de execução (Linux é mais rápido e econômico para validações de lint e build web)
    runs-on: ubuntu-latest

    defaults:
      run:
        # Define o diretório de trabalho padrão para o front-end
        working-directory: apps/frontend

    steps:
      # Passo 1: Baixar o código fonte do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Configurar o ambiente Node.js na versão 20 com cache nativo
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Especifica o caminho do package-lock para o cache funcionar corretamente no monorepo
          cache-dependency-path: apps/frontend/package-lock.json

      # Passo 3: Instalação limpa e determinística das dependências usando npm ci
      - name: Instalar dependências (npm ci)
        run: npm ci

      # Passo 4: Executar o linter para garantir a qualidade e padronização do código
      - name: Executar Lint
        run: npm run lint

      # Passo 5: Executar o build do Vite
      # Nota: O build executará 'tsc -b && vite build', garantindo a validação da tipagem do TypeScript
      - name: Executar Build
        run: npm run build
