name: Auditoria Retroativa

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  security-scan:
    name: Análise de Segurança (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  technical-debt-linting:
    name: Linting de Dívida Técnica
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Run Frontend Lint
        working-directory: apps/frontend
        run: npm run lint || true
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r apps/backend/requirements.txt || true

      - name: Run Backend Lint (Ruff)
        run: ruff check apps/backend || true
        continue-on-error: true

      - name: Report Technical Debt Flags
        run: echo "Analisar relatórios de lint e marcar violações críticas como Dívida Técnica."

  coverage-report:
    name: Relatório de Cobertura de Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Testing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r apps/backend/requirements.txt || true

      - name: Run Backend Tests with Coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest apps/backend --cov=apps/backend --cov-report=xml || true

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  notify-failures:
    name: Notificação de Falhas e Dívida Técnica
    needs: [security-scan, technical-debt-linting, coverage-report]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Status and Notify
        run: |
          echo "Notificando a equipe sobre o status da Auditoria Retroativa..."
          if [[ "${{ needs.security-scan.result }}" != "success" ]]; then
            echo "::error::Análise de Segurança (CodeQL) reportou falhas na main!"
          fi
          if [[ "${{ needs.technical-debt-linting.result }}" != "success" ]]; then
            echo "::warning::Verificação de Dívida Técnica encontrou violações de padrão."
          fi
          if [[ "${{ needs.coverage-report.result }}" != "success" ]]; then
            echo "::warning::Falha ao gerar ou enviar relatório de cobertura de testes."
          fi
          echo "Auditoria concluída. Verificar logs para itens a serem tratados como Dívida Técnica Prioritária."
